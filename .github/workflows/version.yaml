name: Automated Versioning

on:
  push:
    branches:
      - main
    paths:
      - "version/**"
      - ".github/workflows/version.yaml"
  workflow_dispatch:

jobs:
  lcov:
    runs-on: ubuntu-24.04
    name: Versioning Test
    steps:
      - uses: actions/checkout@v4
      - uses: KAnggara/DevOps/version@HEAD
